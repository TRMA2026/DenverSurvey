<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRMA Denver 2026 — Survey Results Report</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1D3A;
    --gold: #C8962E;
    --gold-light: #F5E6C8;
    --slate: #3A4A5C;
    --sky: #E8EFF6;
    --white: #FFFFFF;
    --sand: #FAF7F2;
    --border: #D4D9E0;
    --success: #2E7D4F;
    --card-shadow: 0 1px 3px rgba(11,29,58,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--navy);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    background: var(--navy);
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -20%;
    width: 140%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(200,150,46,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--white);
    font-weight: 800;
    letter-spacing: -0.02em;
    position: relative;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    color: rgba(255,255,255,0.7);
    margin-top: 0.5rem;
    font-size: 0.95rem;
    position: relative;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* Controls bar */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .controls .meta {
    font-size: 0.95rem;
    color: var(--slate);
  }
  .controls .meta strong {
    color: var(--navy);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.55rem 1.2rem;
    border: 1.5px solid var(--navy);
    border-radius: 8px;
    background: var(--white);
    color: var(--navy);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--navy); color: var(--white); }
  .btn-gold { border-color: var(--gold); color: var(--gold); }
  .btn-gold:hover { background: var(--gold); color: var(--navy); }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* Summary cards */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    box-shadow: var(--card-shadow);
  }
  .summary-card .number {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--navy);
  }
  .summary-card .label {
    font-size: 0.78rem;
    color: var(--slate);
    font-weight: 500;
    margin-top: 0.15rem;
  }

  /* View toggle */
  .view-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
  }
  .view-tab {
    padding: 0.5rem 1.2rem;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    border: none;
    background: var(--white);
    color: var(--slate);
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-tab:not(:last-child) { border-right: 1.5px solid var(--border); }
  .view-tab.active { background: var(--navy); color: var(--white); }

  /* Category section */
  .category-section {
    margin-bottom: 2rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    background: var(--navy);
    padding: 0.85rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .category-title .count {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
  }

  /* Ranking table */
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
  }
  .ranking-table th {
    text-align: left;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--slate);
    padding: 0.6rem 1rem;
    border-bottom: 2px solid var(--border);
    background: #F8F9FA;
  }
  .ranking-table th.center { text-align: center; }
  .ranking-table td {
    padding: 0.7rem 1rem;
    font-size: 0.88rem;
    border-bottom: 1px solid #F0F1F3;
    vertical-align: top;
  }
  .ranking-table tr:last-child td { border-bottom: none; }
  .ranking-table tr:hover { background: rgba(200,150,46,0.04); }

  .rank-cell {
    font-weight: 700;
    text-align: center;
    width: 50px;
  }
  .rank-cell.gold { color: var(--gold); }
  .rank-cell.top { 
    color: var(--gold);
    font-size: 1rem;
  }

  .session-info .title {
    font-weight: 600;
    color: var(--navy);
    line-height: 1.35;
  }
  .session-info .speaker {
    font-size: 0.82rem;
    color: var(--slate);
    margin-top: 0.1rem;
  }

  .score-cell {
    text-align: center;
    font-weight: 600;
    width: 80px;
  }

  /* Score bar visualization */
  .score-bar-cell { width: 160px; }
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .score-bar {
    flex: 1;
    height: 8px;
    background: #ECEEF1;
    border-radius: 4px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .score-bar-fill.excellent { background: var(--gold); }
  .score-bar-fill.good { background: #5BA5D9; }
  .score-bar-fill.average { background: #94A3B8; }

  .score-label {
    font-size: 0.8rem;
    font-weight: 600;
    min-width: 32px;
    text-align: right;
    color: var(--navy);
  }

  /* Individual responses view */
  .individual-section {
    display: none;
    margin-bottom: 2rem;
  }
  .individual-section.active { display: block; }
  .aggregate-section.active { display: block; }
  .aggregate-section { display: none; }

  .respondent-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }
  .respondent-header {
    padding: 0.85rem 1.25rem;
    background: #F8F9FA;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .respondent-header:hover { background: #F0F2F5; }
  .respondent-name {
    font-weight: 700;
    font-size: 0.95rem;
  }
  .respondent-date {
    font-size: 0.8rem;
    color: var(--slate);
  }
  .respondent-body {
    display: none;
    padding: 1rem 1.25rem;
  }
  .respondent-body.open { display: block; }
  .respondent-category {
    margin-bottom: 0.85rem;
  }
  .respondent-category h4 {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.35rem;
  }
  .respondent-ranking {
    list-style: none;
    font-size: 0.85rem;
  }
  .respondent-ranking li {
    padding: 0.2rem 0;
    display: flex;
    gap: 0.5rem;
  }
  .respondent-ranking .rnum {
    font-weight: 700;
    color: var(--slate);
    min-width: 1.5rem;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--slate);
    font-size: 1rem;
  }
  .loading .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--slate);
  }
  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    color: var(--navy);
    margin-bottom: 0.5rem;
  }

  /* Print styles */
  @media print {
    body { background: white; }
    .header { padding: 1rem; }
    .controls, .view-tabs, .btn, .individual-section, .admin-link { display: none !important; }
    .aggregate-section { display: block !important; }
    .category-section { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; margin-bottom: 1rem; }
    .summary-bar { margin-bottom: 1rem; }
    .summary-card { box-shadow: none; border: 1px solid #ccc; }
    .score-bar-cell { display: none; }
  }

  .admin-link {
    text-align: center;
    padding: 1rem 0 2rem;
  }
  .admin-link a {
    color: var(--slate);
    font-size: 0.85rem;
    text-decoration: none;
  }
  .admin-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>TRMA <span>Denver 2026</span></h1>
  <p>Program Committee Session Rankings — Results Report</p>
</div>

<div class="container">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    Loading survey responses…
  </div>

  <div id="reportContent" style="display:none;">

    <div class="summary-bar" id="summaryBar"></div>

    <div class="controls">
      <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('aggregate', this)">Aggregate Rankings</button>
        <button class="view-tab" onclick="switchView('individual', this)">Individual Responses</button>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="window.print()">🖨 Print Report</button>
        <button class="btn btn-gold" onclick="exportCSV()">📊 Export CSV</button>
      </div>
    </div>

    <div class="aggregate-section active" id="aggregateView"></div>
    <div class="individual-section" id="individualView"></div>

  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <h2>No Responses Yet</h2>
    <p>Survey responses will appear here once committee members begin submitting their rankings.</p>
  </div>

  <div class="admin-link">
    <a href="survey.html">← Back to Survey</a>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mfocbpqyikdxazjiydgc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb2NicHF5aWtkeGF6aml5ZGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjMyOTYsImV4cCI6MjA5MjMzOTI5Nn0.i-MD2oJLgyuv4sG7xXS5xeBVBlWCDewLg8LCftOBudg';
const TABLE_NAME = 'session_rankings';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── SESSION LOOKUP ────────────────────────────────────────────
const SESSIONS = {
  "Fraud & Identity": [
    { id: "fi-1", speaker: "Emily Auer", org: "SentiLink", title: "Reducing FPDs in Telecom Through Fraud Prevention" },
    { id: "fi-2", speaker: "Terry Brenner", org: "LexisNexis Risk Solutions", title: "AI's Double Role: Fueling and Fighting Identity Fraud" },
    { id: "fi-3", speaker: "Cason Coplin", org: "Socure", title: "Beyond Device Financing: Protecting High-Value Telco Transactions with Identity Graph Intelligence" },
    { id: "fi-4", speaker: "Leslie Deniken", org: "TransUnion", title: "Smart Defense: How Custom ML Models Can Help Stop Telecom Fraud" },
    { id: "fi-5", speaker: "Erika Dietrich", org: "ACI Worldwide", title: "Network Intelligence for Fraud Detection and Prevention" },
    { id: "fi-6", speaker: "Julie Lamphiear", org: "FICO", title: "Say \"Yes\" to More Applicants (Safely): Smarter Risk Decisioning Using Cash Flow Data" },
    { id: "fi-7", speaker: "Kathleen Maley", org: "Experian", title: "Accelerating Fraud Detection Innovation in Telecom" },
    { id: "fi-8", speaker: "Simon Marchand", org: "Independent", title: "Emerging Fraud Trends, AI-Powered Fraud Tools & New Antifraud Technology" },
    { id: "fi-9", speaker: "Cab Morris & Christopher Tennyson", org: "Equifax", title: "Redefine the Telco Customer Journey: Using Identity Insights to Your Advantage" },
    { id: "fi-10", speaker: "Kim White", org: "LexisNexis Risk Solutions", title: "Global State of Fraud and Identity Report 2026" },

  ],
  "AI & Automation": [
    { id: "ai-1", speaker: "Sudiksha Dhoot", org: "January", title: "Using Data and AI to Authentically Understand and Serve the Consumer in Collections" },
    { id: "ai-2", speaker: "Jeffrey Feinstein, PhD", org: "LexisNexis Risk Solutions", title: "The Role of Responsible AI" },
    { id: "ai-3", speaker: "Kenneth Hayes", org: "Bill Gosling Outsourcing", title: "'Cautious' AI Strategies for Optimal Collections" },
    { id: "ai-4", speaker: "Julie Lamphiear", org: "FICO & KredosAi", title: "The Evolution of AI-Driven Workflows in Telecom Revenue Management" },
    { id: "ai-5", speaker: "Tracy Posadowski", org: "KredosAi", title: "The AI and RCS Revolution: Turning Collections into a High-Engagement Customer Experience" },
    { id: "ai-6", speaker: "Chuck Stigers", org: "InDebted", title: "Case Studies in Agentic AI and Digital Communications for Collections Improvement" }
  ],
  "Collections & Engagement": [
    { id: "ce-1", speaker: "Matt Baltzer", org: "Experian", title: "Streamlining Collections: Smarter Strategies for Telecom" },
    { id: "ce-2", speaker: "Peter Ghiselli", org: "Equifax", title: "The Empathy ROI: Why Human-Centric Collections Are the New Competitive Edge" },
    { id: "ce-3", speaker: "Kenneth Peck", org: "Lockhart, Morris & Montgomery", title: "Collections" },
    { id: "ce-4", speaker: "Matthew Saperstein", org: "Phillips & Cohen Associates", title: "Improving Customer Service & Engagement with Digital Communications" }
  ],
  "Credit, BNPL & Alternative Data": [
    { id: "cr-1", speaker: "Christy Brooks", org: "TransUnion", title: "Driving Inclusion Through Credit Innovation: How Rental Data Expands Access" },
    { id: "cr-2", speaker: "Christy Brooks", org: "TransUnion", title: "Plugging Gaps in Consumer Risk Profiles: The Power of Alternative Data" },
    { id: "cr-3", speaker: "Julius Heim", org: "Experian", title: "Alternative Data and BNPL in Modern Credit Decisioning" },
    { id: "cr-4", speaker: "Julie Lamphiear", org: "FICO", title: "Beyond the Bureau: How Alternative Data Is Reshaping Telco Onboarding" },
    { id: "cr-5", speaker: "Mike Pecen", org: "Equifax", title: "Cashflow Solutions for Credit & Collections: Reducing Friction While Maintaining Compliance" },
    { id: "cr-6", speaker: "Mike Pecen", org: "Equifax", title: "Navigating the BNPL Landscape: Directional Insights for Telco & Utility Risk" },
    { id: "cr-7", speaker: "Daniel Sayre", org: "Experian", title: "Removing Friction in Credit Access for Telecom Customers" },
    { id: "cr-8", speaker: "Chad Warner", org: "Equifax", title: "Empowering Consumers to Live Their Financial Best" }
  ],
  "Commercial & B2B": [
    { id: "cb-1", speaker: "Yesinne Alvarez", org: "CreditSafe", title: "Best Practices in B2B Credit Management Using Big Data" },
    { id: "cb-2", speaker: "Li Mao", org: "Experian", title: "Commercial Fraud in Telecom: Trends, Tactics, and Countermeasures" },
    { id: "cb-3", speaker: "Alex Whitacre", org: "Equifax", title: "Commercial Insights: Gaining Visibility and Accelerating Growth Across the Customer Lifecycle" }
  ]
};

const sessionLookup = {};
Object.values(SESSIONS).flat().forEach(s => { sessionLookup[s.id] = s; });

let allResponses = [];

// ─── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  try {
    const { data, error } = await sb.from(TABLE_NAME).select('*').order('submitted_at', { ascending: true });
    if (error) throw error;

    document.getElementById('loadingState').style.display = 'none';

    if (!data || data.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    allResponses = data;
    document.getElementById('reportContent').style.display = 'block';
    renderSummary(data);
    renderAggregate(data);
    renderIndividual(data);
  } catch (err) {
    document.getElementById('loadingState').innerHTML =
      `<p style="color:#C0392B;">Error loading data: ${err.message || err}</p>`;
  }
}

// ─── SUMMARY CARDS ─────────────────────────────────────────────
function renderSummary(responses) {
  const categories = Object.keys(SESSIONS);
  const totalSessions = Object.values(SESSIONS).flat().length;
  const firstDate = new Date(responses[0].submitted_at);
  const lastDate = new Date(responses[responses.length - 1].submitted_at);
  const dateRange = firstDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    (responses.length > 1 ? ' – ' + lastDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '');

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card"><div class="number">${responses.length}</div><div class="label">Responses</div></div>
    <div class="summary-card"><div class="number">${categories.length}</div><div class="label">Categories</div></div>
    <div class="summary-card"><div class="number">${totalSessions}</div><div class="label">Sessions Ranked</div></div>
    <div class="summary-card"><div class="number" style="font-size:1.1rem;">${dateRange}</div><div class="label">Response Period</div></div>
  `;
}

// ─── AGGREGATE VIEW ────────────────────────────────────────────
function renderAggregate(responses) {
  let html = '';

  Object.entries(SESSIONS).forEach(([category, sessions]) => {
    const scores = {};
    sessions.forEach(s => { scores[s.id] = { total: 0, count: 0 }; });

    responses.forEach(r => {
      const catRankings = r.rankings?.[category];
      if (!catRankings) return;
      catRankings.forEach((id, idx) => {
        if (scores[id]) {
          scores[id].total += idx + 1;
          scores[id].count += 1;
        }
      });
    });

    const sorted = sessions.map(s => ({
      ...s,
      avg: scores[s.id].count > 0 ? scores[s.id].total / scores[s.id].count : 999,
      votes: scores[s.id].count
    })).sort((a, b) => a.avg - b.avg);

    const maxRank = sessions.length;

    html += `<div class="category-section">
      <div class="category-title">
        ${category}
        <span class="count">${sessions.length} sessions · ${responses.length} voters</span>
      </div>
      <table class="ranking-table">
        <thead>
          <tr>
            <th class="center">Rank</th>
            <th>Session</th>
            <th class="center">Avg Position</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody>`;

    sorted.forEach((s, i) => {
      const avgDisplay = s.avg < 999 ? s.avg.toFixed(2) : '—';
      const pct = s.avg < 999 ? Math.max(0, (1 - (s.avg - 1) / (maxRank - 1)) * 100) : 0;
      const barClass = pct >= 70 ? 'excellent' : pct >= 40 ? 'good' : 'average';

      html += `<tr>
        <td class="rank-cell ${i < 3 ? 'top' : ''}">${i + 1}</td>
        <td class="session-info">
          <div class="title">${s.title}</div>
          <div class="speaker">${s.speaker} · ${s.org}</div>
        </td>
        <td class="score-cell">${avgDisplay}</td>
        <td class="score-bar-cell">
          <div class="score-bar-wrap">
            <div class="score-bar"><div class="score-bar-fill ${barClass}" style="width:${pct}%"></div></div>
          </div>
        </td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  document.getElementById('aggregateView').innerHTML = html;
}

// ─── INDIVIDUAL VIEW ───────────────────────────────────────────
function renderIndividual(responses) {
  let html = '';

  responses.forEach((r, idx) => {
    const date = new Date(r.submitted_at).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
    });

    html += `<div class="respondent-card">
      <div class="respondent-header" onclick="toggleRespondent(this)">
        <span class="respondent-name">${r.respondent_name}</span>
        <span class="respondent-date">${date}</span>
      </div>
      <div class="respondent-body">`;

    Object.entries(SESSIONS).forEach(([category]) => {
      const catRankings = r.rankings?.[category];
      if (!catRankings) return;

      html += `<div class="respondent-category">
        <h4>${category}</h4>
        <ol class="respondent-ranking">`;

      catRankings.forEach((id, i) => {
        const s = sessionLookup[id];
        const label = s ? `${s.title} — ${s.speaker}` : id;
        html += `<li><span class="rnum">${i + 1}.</span> ${label}</li>`;
      });

      html += `</ol></div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('individualView').innerHTML = html;
}

// ─── UI HELPERS ────────────────────────────────────────────────
function switchView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('aggregateView').classList.toggle('active', view === 'aggregate');
  document.getElementById('individualView').classList.toggle('active', view === 'individual');
}

function toggleRespondent(header) {
  header.nextElementSibling.classList.toggle('open');
}

// ─── CSV EXPORT ────────────────────────────────────────────────
function exportCSV() {
  if (!allResponses.length) return;

  const categories = Object.keys(SESSIONS);
  let csv = 'Respondent,Submitted';

  // Header: one column per category per possible rank
  categories.forEach(cat => {
    const count = SESSIONS[cat].length;
    for (let i = 1; i <= count; i++) {
      csv += `,"${cat} #${i}"`;
    }
  });
  csv += '\n';

  // One row per respondent
  allResponses.forEach(r => {
    csv += `"${r.respondent_name}","${r.submitted_at}"`;
    categories.forEach(cat => {
      const rankings = r.rankings?.[cat] || [];
      const count = SESSIONS[cat].length;
      for (let i = 0; i < count; i++) {
        const id = rankings[i];
        const s = sessionLookup[id];
        const label = s ? s.title : (id || '');
        csv += `,"${label.replace(/"/g, '""')}"`;
      }
    });
    csv += '\n';
  });

  // Add aggregate summary
  csv += '\n\nAGGREGATE RANKINGS\n';
  categories.forEach(cat => {
    csv += `\n"${cat}"\n`;
    csv += 'Rank,Session,Speaker,Avg Position\n';

    const scores = {};
    SESSIONS[cat].forEach(s => { scores[s.id] = { total: 0, count: 0 }; });
    allResponses.forEach(r => {
      const catRankings = r.rankings?.[cat];
      if (!catRankings) return;
      catRankings.forEach((id, idx) => {
        if (scores[id]) {
          scores[id].total += idx + 1;
          scores[id].count += 1;
        }
      });
    });

    const sorted = SESSIONS[cat].map(s => ({
      ...s,
      avg: scores[s.id].count > 0 ? scores[s.id].total / scores[s.id].count : 999
    })).sort((a, b) => a.avg - b.avg);

    sorted.forEach((s, i) => {
      csv += `${i + 1},"${s.title.replace(/"/g, '""')}","${s.speaker}",${s.avg < 999 ? s.avg.toFixed(2) : 'N/A'}\n`;
    });
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `TRMA_Denver_2026_Rankings_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
